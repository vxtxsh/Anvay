# ─────────────────────────────────────────
# Application
# ─────────────────────────────────────────
spring.application.name=anvay

# ─────────────────────────────────────────
# Server (RENDER FIX ✅)
# Render injects PORT — app MUST bind to it
# ─────────────────────────────────────────
server.port=${PORT:8080}

# ─────────────────────────────────────────
# Database (FAIL-FAST SAFE ✅)
# These MUST be provided in Render Env Vars
# ─────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Batch any unavoidable lazy loads (e.g. user.institution accessed in a loop)
# into groups instead of firing one query per entity. Mitigates N+1 when a
# code path forgot to JOIN FETCH. Harmless if no lazy loads happen.
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Disable Flyway if not used
spring.flyway.enabled=false

# ─────────────────────────────────────────
# JWT (FAIL-FAST SAFE ✅)
# ─────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ─────────────────────────────────────────
# Super Admin (OK)
# ─────────────────────────────────────────
app.superadmin.name=Super Admin
app.superadmin.email=admin@anvay.com
app.superadmin.password=Admin@123

# ─────────────────────────────────────────
# Swagger / SpringDoc
# ─────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.cts.mfrp.anvay.controller

# ─────────────────────────────────────────
# CORS (FIXED KEY NAME ✅)
# ENV VARS CANNOT HAVE HYPHENS
# ─────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# ─────────────────────────────────────────
# Logging (TEMPORARY — REMOVE AFTER DEBUG)
# ─────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework=INFO

# Surface DB / Hibernate failures while debugging the 500 errors. Toggle
# back to WARN once the root cause is fixed.
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.cts.mfrp.anvay=DEBUG

# Debug flag: set DEBUG_EXPOSE_ERRORS=true in Render env vars to see the
# real exception message in 500 responses instead of "An unexpected error..."
app.debug.expose-errors=${DEBUG_EXPOSE_ERRORS:false}

# Don't crash serialization on entities that have no usable getters yet
spring.jackson.serialization.fail-on-empty-beans=false
