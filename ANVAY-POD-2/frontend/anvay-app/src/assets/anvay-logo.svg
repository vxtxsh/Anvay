<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="45%"  stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="gradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="50%"  stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&amp;display=swap');
    </style>
  </defs>

  <!-- Outer gradient ring -->
  <circle cx="110" cy="110" r="104" fill="none" stroke="url(#grad)" stroke-width="9"/>

  <!-- Inner thin accent ring -->
  <circle cx="110" cy="110" r="92" fill="none" stroke="url(#grad)" stroke-width="2" stroke-opacity="0.45"/>

  <!-- Bold A -->
  <text
    x="110" y="150"
    text-anchor="middle"
    font-family="'Playfair Display', 'Times New Roman', Georgia, serif"
    font-size="124"
    font-weight="900"
    fill="url(#gradV)">A</text>
</svg>
